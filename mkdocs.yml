site_name: TicketForge
site_description: The ultimate Discord ticketing bot.
site_url: https://docs.ticketforge.xyz/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: indigo

  # 1. UPDATED LOGO & FAVICON
  logo: assets/images/logo.png
  favicon: assets/images/favicon.ico

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  
  - GETTING STARTED:
    - Installation: getting-started/installation.md
    - Dashboard Overview: getting-started/dashboard.md
    - Premium Plans: premium.md

  - PANEL CONFIGURATION:
    - Creating Panels: panels/create.md
    - The Panel Editor: panels/editor.md
    - Messages & Embeds: panels/messages.md
    - Interaction Styles: guides/button-styles.md
    - Custom Forms: features/forms.md
    - Ticket Settings: panels/management.md

  - ADVANCED AUTOMATION:
    - Claiming System: features/claiming.md
    - Automation Triggers: features/automation.md
    - Rating System: features/ratings.md
    - Tickets as Threads: features/threads.md
    - Limits & Schedules: features/limits.md
    - Transcripts: features/transcripts.md

  - TEMPLATES:
    - Using Templates: panels/templates.md
  
  - REFERENCE:
    - Variable Placeholders: guides/placeholders.md
    - Command List: settings/commands.md
    - Server Settings: settings/server-config.md
    - Troubleshooting: guides/troubleshooting.md